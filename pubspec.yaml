publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  drift: ^2.23.0
  drift_flutter: ^0.2.7
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.2.3
